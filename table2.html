<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>2026 Winter Games — Medals Per Capita | Vegas Insider</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root{
      --bg:#ffffff;
      --ink:#0f172a;
      --muted:#6b7280;
      --hair: rgba(148,163,184,0.65);

      --gold:#D9A300;
      --silver:#9AA3AF;
      --bronze:#B86A34;

      --font: system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      --mono: ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono",monospace;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family:var(--font);
      background:var(--bg);
      color:var(--ink);
      padding:18px 18px 10px;
    }

    .wrap{ max-width:1200px; margin:0 auto; }

    /* ===== HERO ===== */
    .hero{
      display:flex;
      gap:16px;
      align-items:flex-start;
      padding-top:4px;
      margin-bottom:10px;
    }

    .hero h1{
      margin:0;
      font-size:44px;
      font-weight:1000;
      letter-spacing:-0.02em;
      text-transform:uppercase;
      line-height:1.0;
    }

    .hero .sub{
      margin-top:8px;
      font-size:12px;
      font-weight:900;
      letter-spacing:0.16em;
      text-transform:uppercase;
      color:var(--muted);
      line-height:1.25;
      max-width:74ch;
    }

    /* ===== GRID ===== */
    .grid{
      display:grid;
      grid-template-columns: repeat(5, 1fr);
      gap:14px;
      margin-top:10px;
    }

    @media (max-width:1100px){
      .grid{ grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width:760px){
      .grid{ grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width:520px){
      .grid{ grid-template-columns: 1fr; }
    }

    /* ===== CARD ===== */
    .card{
      border:1px solid rgba(15,23,42,0.10);
      border-radius:12px;
      padding:12px;
      background:#fff;
    }

    .head{
      display:flex;
      align-items:center;
      gap:10px;
      padding-bottom:8px;
    }

    .flag{
      width:26px;
      height:18px;
      border-radius:4px;
      object-fit:cover;
      border:1px solid rgba(15,23,42,0.10);
      flex:0 0 auto;
    }

    .name{
      display:flex;
      align-items:baseline;
      gap:8px;
      font-weight:1000;
      text-transform:uppercase;
      font-size:12px;
      white-space:nowrap;
      min-width:0;
    }

    .rank{
      font-family:var(--mono);
      font-weight:1000;
      font-size:12px;
      color:rgba(15,23,42,0.70);
    }

    .rule{
      flex:1 1 auto;
      height:1px;
      background:var(--hair);
      margin:0 6px;
    }

    .medalsTotal{
      font-family:var(--mono);
      font-weight:1000;
      font-size:12px;
      white-space:nowrap;
      color:rgba(15,23,42,0.90);
    }

    .contentWell{
      min-height:170px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
    }

    .heroMetric{
      display:flex;
      align-items:baseline;
      gap:8px;
      margin:0;
      height:22px;
    }

    .heroMetric .num{
      font-family:var(--mono);
      font-weight:1000;
      font-size:18px;
      letter-spacing:-0.01em;
      color:rgba(15,23,42,0.95);
    }

    .heroMetric .tag{
      font-size:11px;
      font-weight:950;
      letter-spacing:0.12em;
      text-transform:uppercase;
      color:var(--muted);
    }

    .stacks{
      display:flex;
      gap:2px;
      align-items:flex-end;
      justify-content:flex-start;
      padding-top:2px;
    }

    .stack{ text-align:center; }

    .dots{
      --size: 14px;
      --gap: 2px;
      --cols: 4;

      display:grid;
      grid-template-columns: repeat(var(--cols), var(--size));
      gap:var(--gap);
      align-content:end;
      height:88px;
      justify-content:center;
      width:max-content;
      margin:0 auto;
    }

    .dots.small{ --cols: 3; height:68px; }
    .dots.tiny{  --cols: 2; height:56px; }

    .dot{
      width:var(--size);
      height:var(--size);
      border-radius:999px;
      display:block;
    }

    .count{
      margin-top:6px;
      font-family:var(--mono);
      font-weight:1000;
      font-size:12px;
      line-height:1.0;
      color:rgba(15,23,42,0.92);
    }

    .stats{
      margin-top:10px;
      padding-top:10px;
      border-top:1px solid rgba(15,23,42,0.08);
      display:flex;
      justify-content:space-between;
      gap:10px;
      font-size:12px;
      font-weight:900;
    }

    .label{
      color:rgba(15,23,42,0.68);
      font-weight:900;
      letter-spacing:0.02em;
    }

    .value{
      font-family:var(--mono);
      font-weight:1000;
      color:rgba(15,23,42,0.92);
      white-space:nowrap;
    }

    .footer{
      margin-top:12px;
      padding-top:12px;
      border-top:1px solid rgba(15,23,42,0.10);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      color:var(--muted);
      font-size:11px;
      font-weight:900;
      letter-spacing:0.08em;
      text-transform:uppercase;
    }

    .vilogo{ height:36px; width:auto; display:block; }
  </style>
</head>

<body>
  <div class="wrap">

    <div class="hero">
      <div>
        <h1>2026 Winter Games</h1>
        <div class="sub">Medals Per Capita • Ranked by Medals Per 1M Residents</div>
      </div>
    </div>

    <div class="grid" id="grid" aria-label="Medals per capita ranking cards"></div>

    <div class="footer">
      <div>Source: Official final results • Population: latest national estimates • Visual: Vegas Insider</div>
      <img class="vilogo" src="https://i.postimg.cc/j5k31rQZ/download.png" alt="Vegas Insider logo" />
    </div>

  </div>

  <script>
    const rows = [
      { rank:1, country:"Norway",      iso2:"no", medals:41, gold:18, silver:12, bronze:11, pop_m:5.5,  mpm:7.5 },
      { rank:2, country:"Netherlands", iso2:"nl", medals:20, gold:10, silver: 7, bronze: 3, pop_m:17.8, mpm:1.1 },
      { rank:3, country:"Austria",     iso2:"at", medals:18, gold: 5, silver: 8, bronze: 5, pop_m:9.1,  mpm:2.0 },
      { rank:4, country:"Slovenia",    iso2:"si", medals: 4, gold: 2, silver: 1, bronze: 1, pop_m:2.1,  mpm:1.9 },
      { rank:5, country:"Switzerland", iso2:"ch", medals:23, gold: 6, silver: 9, bronze: 8, pop_m:8.8,  mpm:2.6 }
    ];

    const flagURL = iso2 => `https://flagcdn.com/w40/${iso2}.png`;

    const css = getComputedStyle(document.documentElement);
    const COLORS = {
      gold:   css.getPropertyValue("--gold").trim(),
      silver: css.getPropertyValue("--silver").trim(),
      bronze: css.getPropertyValue("--bronze").trim()
    };

    function dotsHTML(n, color, cols){
      const fullRows = Math.floor(n / cols);
      const rem = n % cols;

      let out = "";
      if(rem > 0){
        for(let i=0;i<rem;i++) out += `<span class="dot" style="background:${color}"></span>`;
      }
      for(let i=0;i<fullRows*cols;i++) out += `<span class="dot" style="background:${color}"></span>`;
      return out;
    }

    function stack(n, color, sizeClass, cols){
      return `
        <div class="stack">
          <div class="dots ${sizeClass}">${dotsHTML(n, color, cols)}</div>
          <div class="count">${n}</div>
        </div>
      `;
    }

    function card(d){
      const tiny  = d.medals <= 4;
      const small = d.medals <= 6;

      const cols = tiny ? 2 : (small ? 3 : 4);
      const sizeClass = tiny ? "tiny" : (small ? "small" : "");

      return `
        <div class="card">
          <div class="head">
            <img class="flag" src="${flagURL(d.iso2)}" alt="${d.country} flag">
            <div class="name">
              <span class="rank">${d.rank}</span>
              <span>${d.country}</span>
            </div>
            <div class="rule" aria-hidden="true"></div>
            <div class="medalsTotal">${d.medals}</div>
          </div>

          <div class="contentWell">
            <div class="heroMetric">
              <div class="num">~${d.mpm.toFixed(1)}</div>
              <div class="tag">per 1M</div>
            </div>

            <div class="stacks">
              ${stack(d.gold, COLORS.gold, sizeClass, cols)}
              ${stack(d.silver, COLORS.silver, sizeClass, cols)}
              ${stack(d.bronze, COLORS.bronze, sizeClass, cols)}
            </div>
          </div>

          <div class="stats">
            <div class="label">Population</div>
            <div class="value">~${d.pop_m.toFixed(1)}M</div>
          </div>
        </div>
      `;
    }

    document.getElementById("grid").innerHTML = rows.map(card).join("");
  </script>
</body>
</html>
